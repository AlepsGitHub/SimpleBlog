{% extends 'layout.html' %}
{% block title %}
    Posts
{% endblock %}
{% block content %}
    <section>
        <h1>Posts</h1>
        {% for post in posts %}
        <article class="post">
            <a class="post-title" href="{% url 'posts:page' slug=post.slug %}">
                <h2>{{ post.title }}</h2>
            </a>
            <p class="post-meta">{{ post.date }} by {{ post.author }}</p>
            <p class="post-body">{{ post.body }}</p>
        </article>
        {% endfor %}
    </section>
{% endblock %}
